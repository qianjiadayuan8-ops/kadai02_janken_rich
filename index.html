<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>ルーレットじゃんけんアプリ</title>
</head>
<body>
    <h1>スロットじゃんけん</h1>
    <div class="block">
        <div class="cpu">
            <p class="cpu-text text">この手に勝とう！</p>
            <div class="hand">✊</div>
        </div>
        <div class="explanation">
            <p class="explanation-text text">配当一覧</p>
            <ul>
                <li>3つ勝ち<span>3枚</span></li>
                <li>2つ勝ち<span>2枚</span></li>
                <li>3つ勝ち<span>1枚</span></li>
            </ul>
        </div>
    </div>
    <div class="slot">
        <div class="slot-parts">
            <div id="slot1">✊</div>
            <button id="stop1">STOP</button>
        </div>
        <div class="slot-parts">
            <div id="slot2">✊</div>
            <button id="stop2">STOP</button>
        </div>
        <div class="slot-parts">
            <div id="slot3">✊</div>
            <button id="stop3">STOP</button>
        </div>
    </div>
    <div class="coin">
        <div>
            <p>現在の結果</p>
            <p>3枚獲得</p>
        </div>
        <div>
            <p>所持コイン</p>
            <p>4枚</p>
        </div>
    </div>
    <button>
        <p>プレイ</p>
        <p>ペット1枚</p>
    </button>
    

    <!-- js -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
